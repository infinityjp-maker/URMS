services:
  postgres:
    image: postgres:16-alpine
    container_name: urms-postgres
    environment:
      POSTGRES_USER: urms
      POSTGRES_PASSWORD: urms
      POSTGRES_DB: urms
    ports:
      - '5432:5432'
    volumes:
      - urms_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U urms -d urms']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  urms_pg_data:
