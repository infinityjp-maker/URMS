services:
  postgres:
    image: postgres:16-alpine
    container_name: urms-postgres
    environment:
      POSTGRES_USER: urms
      POSTGRES_PASSWORD: urms
      POSTGRES_DB: urms
    ports:
      - '5432:5432'
    volumes:
      - urms_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U urms -d urms']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: urms-api
    environment:
      DATABASE_URL: postgresql://urms:urms@postgres:5432/urms?schema=public
      PORT: 3000
      HOST: 0.0.0.0
      URMS_AUTH_BYPASS: 'true'
      URMS_FF_AI_ENABLED: 'false'
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_BASE_URL: ''
    container_name: urms-web
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: urms-nginx
    ports:
      - '8080:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    restart: unless-stopped

  # Optional: docker compose --profile observability up -d loki
  loki:
    profiles: [observability]
    image: grafana/loki:3.0.0
    container_name: urms-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - '3100:3100'
    volumes:
      - ./docker/loki-config.yml:/etc/loki/local-config.yaml:ro
      - urms_loki_data:/loki
    restart: unless-stopped

volumes:
  urms_pg_data:
  urms_loki_data:
