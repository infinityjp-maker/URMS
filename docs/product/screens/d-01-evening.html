<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>D-01c 夕 — URMS 製品モック</title>
    <link rel="stylesheet" href="./product-screens.css" />
  </head>
  <body>
    <div class="mock-banner">D-01c 夕 — 天気なし · まとめ · タスク · 完了→次へ</div>
    <div class="mock-frame">
      <header class="mock-header">
        <span class="mock-brand">URMS</span>
        <div class="mock-meta"><span>モード: 運用</span></div>
      </header>
      <div class="mock-grid mock-grid--compact">
        <div class="panel">
          <div class="card">
            <p class="clock">19:20</p>
            <p class="status-line">今日ループ済</p>
          </div>
          <div class="card">
            <p class="card-kicker">次の予定</p>
            <p><strong>20:00</strong> 振り返り</p>
          </div>
        </div>
        <div class="panel">
          <div class="card">
            <p class="card-kicker">今日のまとめ</p>
            <p>Condition 68 · 製品 v0.2 実装中</p>
          </div>
          <div class="card">
            <p class="card-kicker">タスク</p>
            <ul><li>設計パックを判断</li></ul>
            <p style="margin-top: 1rem"><span class="btn btn--primary">完了 → 次へ</span></p>
          </div>
          <div class="card">
            <p class="card-kicker">AI からのひとこと</p>
            <p>夕方は振り返り向き。無理に増やしません。</p>
          </div>
        </div>
      </div>
      <p class="hint"><a href="./index.html">← 索引</a></p>
    </div>
