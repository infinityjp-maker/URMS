<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>D-01a 朝 — URMS 製品モック</title>
    <link rel="stylesheet" href="./product-screens.css" />
  </head>
  <body>
    <div class="mock-banner">D-01a 朝 — 天気 · 予定1 · AI（タスクなし）</div>
    <div class="mock-frame">
      <header class="mock-header">
        <span class="mock-brand">URMS</span>
        <div class="mock-meta"><span>モード: 運用</span><span>新しい一日</span></div>
      </header>
      <div class="mock-grid mock-grid--compact">
        <div class="panel">
          <div class="card">
            <p class="clock">07:15</p>
            <p class="date-line">2026年7月8日 火曜</p>
            <p class="status-line">新しい一日 · 軽やかに始めましょう</p>
          </div>
          <div class="card">
            <p class="card-kicker">天気</p>
            <p class="clock" style="font-size: 1.75rem">22°C</p>
            <p class="hint">傘は不要そうです</p>
          </div>
          <div class="card">
            <p class="card-kicker">次の予定</p>
            <p><strong>09:30</strong> プロジェクト定例</p>
          </div>
        </div>
        <div class="panel">
          <div class="card">
            <p class="card-kicker">AI からのひとこと</p>
            <p>朝は予定1件だけ。午後にタスクと「完了→次へ」が出ます。</p>
          </div>
        </div>
      </div>
      <p class="hint"><a href="./index.html">← 索引</a></p>
    </div>
  </body>
</html>
