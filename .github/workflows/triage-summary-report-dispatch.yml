name: Triage Summary Full Report (dispatch wrapper)

on:
  workflow_dispatch:
    inputs:
      smoke_run_id:
        description: 'Optional run id of run-health-smoke to fetch artifacts from'
        required: false
        default: ''
      selftest_run_id:
        description: 'Optional run id of triage-summary-selftest to fetch artifacts from'
        required: false
        default: ''
  # keep nightly schedule in sync with main workflow
  schedule:
    - cron: '0 4 * * *'

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tools
        run: |
          sudo apt-get update -y || true
          sudo apt-get install -y jq unzip || true

      - name: Optionally download artifacts from provided runs
        env:
          SMOKE_RUN: ${{ github.event.inputs.smoke_run_id }}
          SELFTEST_RUN: ${{ github.event.inputs.selftest_run_id }}
        run: |
          set -e
          TMP=${RUNNER_TEMP}
          echo "SMOKE_RUN=$SMOKE_RUN SELFTEST_RUN=$SELFTEST_RUN"
          if [ -n "$SMOKE_RUN" ]; then
            echo "Attempting to download artifacts for smoke run $SMOKE_RUN"
            gh run download "$SMOKE_RUN" --name triage-summary -D "$TMP" || true
            gh run download "$SMOKE_RUN" --name triage-summary-html -D "$TMP" || true
            gh run download "$SMOKE_RUN" --name triage-summary-compressed -D "$TMP" || true
          fi
          if [ -n "$SELFTEST_RUN" ]; then
            echo "Attempting to download artifacts for selftest run $SELFTEST_RUN"
            gh run download "$SELFTEST_RUN" --name triage-selftest-artifacts -D "$TMP" || true
          fi

      - name: Generate current triage summary if missing
        env:
          DEST: ${{ runner.temp }}/triage-summary.md
        run: |
          TMP=${RUNNER_TEMP}
          if [ ! -f "$TMP/triage-summary.md" ]; then
            echo 'triage-summary.md not found in runner.temp; attempting to run generator using builds/diagnostics/triage.json (if present)'
            if [ -f "builds/diagnostics/triage.json" ]; then
              node .github/workflows/generate-triage-summary.cjs DEST="$DEST" || true
            else
              echo 'No triage.json available to generate summary'
            fi
          else
            echo 'triage-summary.md already present'
          fi

      - name: Validate triage outputs (report)
        run: |
          echo 'Validating triage outputs before building report'
          node .github/triage-tools/validate-triage-output.cjs "$RUNNER_TEMP" || (echo 'report validation failed' && exit 1)
        shell: bash

      - name: Build integrated report
        run: |
          set -e
          TMP=${RUNNER_TEMP}
          OUT="$TMP/triage-summary-full-report.md"
          echo "# Triage Summary Full Report" > "$OUT"
          echo "" >> "$OUT"
          echo "Generated: $(date -u --rfc-3339=seconds)" >> "$OUT"
          echo "" >> "$OUT"

          if [ -f "$TMP/triage-summary.md" ]; then
            echo '## Overview & Summary' >> "$OUT"
            awk '/## Overview/{flag=1} /---/{if(flag && /Details/){exit}} flag{print}' "$TMP/triage-summary.md" | sed -n '1,200p' >> "$OUT" || true
            echo "" >> "$OUT"
          else
            echo '## Overview & Summary' >> "$OUT"
            echo '_triage-summary.md not found_' >> "$OUT"
            echo "" >> "$OUT"
          fi

          echo '## Changes vs Previous Run' >> "$OUT"
          DIFF="$TMP/triage-diff.json"
          if [ -f "$DIFF" ]; then
            echo 'Diff file present; summarizing' >> "$OUT"
            jq '.' "$DIFF" >> "$OUT" 2>/dev/null || cat "$DIFF" >> "$OUT"
          else
            echo '- No triage-diff.json available' >> "$OUT"
          fi
          echo "" >> "$OUT"

          echo '## HTML Artifact' >> "$OUT"
          if [ -f "$TMP/triage-summary.html" ]; then
            echo '- HTML present: yes' >> "$OUT"
            echo "- HTML local: $TMP/triage-summary.html" >> "$OUT"
          else
            echo '- HTML present: no' >> "$OUT"
          fi
          echo "" >> "$OUT"

          echo '## TXT Compatibility' >> "$OUT"
          if [ -f "$TMP/triage-summary.txt" ]; then
            echo '- triage-summary.txt: present' >> "$OUT"
          else
            echo '- triage-summary.txt: missing' >> "$OUT"
          fi
          echo "" >> "$OUT"

          echo '## Internal Errors Extraction' >> "$OUT"
          if [ -f "$TMP/triage-internal-errors.txt" ]; then
            echo '- extracted file: yes' >> "$OUT"
            echo "- path: $TMP/triage-internal-errors.txt" >> "$OUT"
          else
            echo '- extracted file: no' >> "$OUT"
          fi
          echo "" >> "$OUT"

          echo '## Compressed artifacts' >> "$OUT"
          for f in triage-summary.md.gz triage-summary.html.gz triage-summary.txt.gz; do
            if [ -f "$TMP/$f" ]; then
              echo "- $f: present" >> "$OUT"
              if gunzip -t "$TMP/$f" 2>/dev/null; then
                echo "  - gzip integrity: ok" >> "$OUT"
              else
                echo "  - gzip integrity: failed" >> "$OUT"
              fi
            else
              echo "- $f: missing" >> "$OUT"
            fi
          done
          echo "" >> "$OUT"

          echo '## Self-test run status' >> "$OUT"
          if [ -n "${{ github.event.inputs.selftest_run_id }}" ]; then
            STATUS=$(gh run view ${{ github.event.inputs.selftest_run_id }} --json conclusion -q .conclusion 2>/dev/null || echo 'unknown')
            echo "- run id: ${{ github.event.inputs.selftest_run_id }}" >> "$OUT"
            echo "- conclusion: $STATUS" >> "$OUT"
          else
            echo '- selftest run id not provided' >> "$OUT"
          fi
          echo "" >> "$OUT"

          echo '## Run & Artifacts' >> "$OUT"
          if [ -n "${{ github.event.inputs.smoke_run_id }}" ]; then
            echo "- smoke run: https://github.com/${{ github.repository }}/actions/runs/${{ github.event.inputs.smoke_run_id }}" >> "$OUT"
            echo "- smoke artifacts: https://github.com/${{ github.repository }}/actions/runs/${{ github.event.inputs.smoke_run_id }}/artifacts" >> "$OUT"
          else
            echo '- smoke run id not provided' >> "$OUT"
          fi
          if [ -n "${{ github.event.inputs.selftest_run_id }}" ]; then
            echo "- selftest run: https://github.com/${{ github.repository }}/actions/runs/${{ github.event.inputs.selftest_run_id }}" >> "$OUT"
            echo "- selftest artifacts: https://github.com/${{ github.repository }}/actions/runs/${{ github.event.inputs.selftest_run_id }}/artifacts" >> "$OUT"
          else
            echo '- selftest run id not provided' >> "$OUT"
          fi

          echo "" >> "$OUT"
          cat >> "$OUT" << 'TEMPLATE'

# Notification template (Slack/Teams)
# POST to your webhook with the following JSON (uncomment and configure to enable):
# {
#   "text": "Triage Summary Full Report: <report link or summary here>"
# }

TEMPLATE

          echo "Wrote full report to $OUT"

      - name: Upload full report
        uses: actions/upload-artifact@v4
        with:
          name: triage-summary-full-report
          path: ${{ runner.temp }}/triage-summary-full-report.md

      - name: Summarize diff for dashboard
        if: always()
        run: |
          echo 'Generating diff summary'
          node .github/triage-tools/summarize-diff.cjs --in "$RUNNER_TEMP/triage-diff.json" --out "$RUNNER_TEMP/triage-diff-summary.md" || true
          cp "$RUNNER_TEMP/triage-diff-summary.md" "$GITHUB_WORKSPACE/dashboard/diffs/triage-diff-summary-$(date +%s).md" || true
          node .github/triage-tools/llm-summarize-diff.cjs --in "$RUNNER_TEMP/triage-diff-summary.json" --out "$RUNNER_TEMP/triage-llm-summary.md" || node .github/triage-tools/llm-summarize-diff.cjs --in "$RUNNER_TEMP/triage-diff.json" --out "$RUNNER_TEMP/triage-llm-summary.md" || true
          cp "$RUNNER_TEMP/triage-llm-summary.md" "$GITHUB_WORKSPACE/dashboard/diffs/triage-llm-summary-$(date +%s).md" || true
        shell: bash

      - name: Prepare dashboard content
        if: always()
        run: |
          echo 'Preparing dashboard files'
          mkdir -p dashboard/reports dashboard/diffs
          if [ -f "$RUNNER_TEMP/triage-summary-full-report.md" ]; then
            cp "$RUNNER_TEMP/triage-summary-full-report.md" dashboard/reports/latest.md
            echo '<!doctype html><html><body><pre>' > dashboard/reports/latest.html
            sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' "$RUNNER_TEMP/triage-summary-full-report.md" >> dashboard/reports/latest.html
            echo '</pre></body></html>' >> dashboard/reports/latest.html
            ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            sev=$(node -e "try{console.log(require(process.env.RUNNER_TEMP+'/triage-diff-summary.json').severity||'unknown')}catch(e){console.log('unknown')}")
            ie=$(node -e "try{console.log(require(process.env.RUNNER_TEMP+'/triage-diff-summary.json').internalErrorsCur||0)}catch(e){console.log(0)}")
            tags=$(node -e "try{console.log(JSON.stringify(require(process.env.RUNNER_TEMP+'/triage-diff-summary.json').tagsAdded||[]))}catch(e){console.log('[]')}")
            summary=$(sed -n '/### Summary/,$p' "$RUNNER_TEMP/triage-summary-full-report.md" | sed -n '2p' | sed "s/^> *//" | sed "s/\"/\\\"/g" ) || summary=""
            tags=$(node -e "try{const p=require(process.env.RUNNER_TEMP+'/triage-diff-summary.json'); console.log(JSON.stringify(p.tagsAdded||[]));}catch(e){try{const t=require('builds/diagnostics/triage.json'); console.log(JSON.stringify(t.inferredTags||[]))}catch(e){console.log('[]')}}")
            sevnum=$(node -e "try{const s=require(process.env.RUNNER_TEMP+'/triage-diff-summary.json').severity||'unknown'; const map={'critical':3,'warning':2,'info':1}; console.log(map[(s||'').toLowerCase()]||0);}catch(e){console.log(0)}")
            entry=$(jq -n --arg ts "$ts" --arg sev "$sev" --argjson ie "$ie" --argjson tags "$tags" --arg summary "$summary" --argjson sevnum "$sevnum" --arg diffLines "diffs/triage-diff-lines-latest.json" --arg llmSummary "diffs/triage-llm-summary-latest.md" '{timestamp:$ts, severity:$sev, severityNumeric:$sevnum, internalErrors:$ie, tags:$tags, summary:$summary, report:"reports/latest.html", diff:"diffs/triage-diff-summary-latest.json", diffLines:$diffLines, llmSummary:$llmSummary}')
            if [ -f dashboard/reports/index.json ]; then
              tmp=$(mktemp)
              jq -c "." dashboard/reports/index.json > $tmp || true
              jq -c --argjson e "$entry" '[ $e ] + (if (input) then input else [] end)' $tmp > dashboard/reports/index.json || echo "$entry" > dashboard/reports/index.json
            else
              echo "[ $entry ]" > dashboard/reports/index.json
            fi
          fi
          if [ -f "$RUNNER_TEMP/triage-diff-summary.md" ]; then
            cp "$RUNNER_TEMP/triage-diff-summary.md" dashboard/diffs/triage-diff-summary-latest.md || true
          fi
          if [ -f "$RUNNER_TEMP/triage-diff-summary.json" ]; then
            cp "$RUNNER_TEMP/triage-diff-summary.json" dashboard/diffs/triage-diff-summary-latest.json || true
          fi
          if [ -f "$RUNNER_TEMP/triage-diff.json" ]; then
            jq '{mdLines:.changes.C.mdLines, htmlLines:.changes.C.htmlLines}' "$RUNNER_TEMP/triage-diff.json" > "$RUNNER_TEMP/triage-diff-lines.json" || true
            cp "$RUNNER_TEMP/triage-diff-lines.json" dashboard/diffs/triage-diff-lines-latest.json || true
          fi
        shell: bash

      - name: Deploy dashboard to gh-pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
