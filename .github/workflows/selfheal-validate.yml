name: selfheal-validate

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node version
        run: node --version

      - name: Echo marker
        run: echo "selfheal-validate"

      - name: Run lightweight selfheal
        run: |
          echo "lightweight selfheal run" > selfheal_test.txt
          echo "log: $(Get-Date -Format o)" >> selfheal_test.txt

      - name: Upload test artifact
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-test-artifact
          path: selfheal_test.txt
