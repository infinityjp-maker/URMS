name: selfheal-validate

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node version
        run: node --version

      - name: Echo marker
        run: echo "selfheal-validate"

      - name: Run lightweight selfheal
        run: |
          echo "lightweight selfheal run" > selfheal_test.txt
          echo "log: $(Get-Date -Format o)" >> selfheal_test.txt

      - name: Upload test artifact
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-test-artifact
          path: selfheal_test.txt

      - name: Run production selfheal
        run: |
          echo "Running production selfheal (pwsh)"
          pwsh -NoProfile -NonInteractive -File .gh-run-scripts/selfhosted_repair/selfheal.ps1 -Mode production

      - name: Record RunnerService.exe final size and SHA256
        if: ${{ always() }}
        run: |
          set -eux
          OUTFILE=.gh-run-scripts/selfhosted_repair/selfheal_final_info.txt
          echo "[PRODUCTION RUN] RunnerService final info" > $OUTFILE || true
          exe=$(find "$GITHUB_WORKSPACE" -type f -name RunnerService.exe -print -quit || true)
          if [ -n "$exe" ]; then
            echo "Path: $exe" >> $OUTFILE || true
            size=$(stat -c%s "$exe" || true)
            echo "SizeBytes: ${size}" >> $OUTFILE || true
            sha=$(sha256sum "$exe" 2>/dev/null | awk '{print $1}' || true)
            echo "SHA256: ${sha}" >> $OUTFILE || true
          else
            echo "RunnerService.exe not found" >> $OUTFILE || true
          fi

      - name: Upload selfheal final info
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-final-info
          path: .gh-run-scripts/selfhosted_repair/selfheal_final_info.txt


      - name: Upload selfheal phase1 log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-phase1-log
          path: .gh-run-scripts/selfhosted_repair/selfheal_log_phase1.txt

      - name: Upload selfheal phase2 log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-phase2-log
          path: .gh-run-scripts/selfhosted_repair/selfheal_log_phase2.txt

      - name: Upload selfheal phase2 error
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-phase2-error
          path: .gh-run-scripts/selfhosted_repair/selfheal_error_phase2.txt

      - name: Upload selfheal production error
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-production-error
          path: .gh-run-scripts/selfhosted_repair/selfheal_error_production.txt

      - name: Upload selfheal phase3 log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-phase3-log
          path: .gh-run-scripts/selfhosted_repair/selfheal_log_phase3.txt

      - name: Upload selfheal phase3 detected issue
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-phase3-detected
          path: .gh-run-scripts/selfhosted_repair/selfheal_detected_issue.txt

      - name: Upload selfheal phase4 log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-phase4-log
          path: .gh-run-scripts/selfhosted_repair/selfheal_log_phase4.txt

      - name: Upload selfheal repair start
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-repair-start
          path: .gh-run-scripts/selfhosted_repair/selfheal_repair_start.txt

      - name: Upload selfheal repair log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-repair-log
          path: .gh-run-scripts/selfhosted_repair/selfheal_repair_log.txt

      - name: Collect selfheal logs
        if: ${{ always() }}
        run: |
          mkdir -p selfheal_logs
          # copy logs produced by selfheal into the archive directory
          # copy specific important logs first to ensure inclusion
          cp -v .gh-run-scripts/selfhosted_repair/selfheal_repair_trace.txt .gh-run-scripts/selfhosted_repair/selfheal_repair_log.txt .gh-run-scripts/selfhosted_repair/selfheal_repair_start.txt .gh-run-scripts/selfhosted_repair/selfheal_log_phase4.txt .gh-run-scripts/selfhosted_repair/selfheal_detected_issue.txt .gh-run-scripts/selfhosted_repair/*.txt .gh-run-scripts/selfhosted_repair/*.log .gh-run-scripts/selfhosted_repair/*.json selfheal_logs/ 2>/dev/null || true
          # include nested selfheal_logs if script aggregated them
          cp -rv .gh-run-scripts/selfhosted_repair/selfheal_logs/* selfheal_logs/ 2>/dev/null || true
          tar -czf selfheal_logs.tgz selfheal_logs || true

      - name: Upload production artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-production-artifacts
          path: |
            selfheal_logs.tgz
            selfheal_missing.txt

      - name: Selfheal result check
        if: ${{ always() }}
        run: |
          if [ -f selfheal_missing.txt ]; then
            echo "Warning: selfheal script missing; artifact uploaded.";
            exit 0;
          fi
          echo "Assuming selfheal completed; check uploaded artifacts for logs.";
