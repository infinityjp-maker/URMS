name: Run Health Check and Smoke (manual)

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner label to use (e.g. ubuntu-latest or self-hosted)'
        required: false
        default: 'ubuntu-latest'
      ci_browser_args:
        description: 'Additional Chromium args for CI (overrides default)'
        required: false
        default: "--disable-site-isolation-trials --disable-features=IsolateOrigins,site-per-process"

jobs:
  run-health-smoke:
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-latest' }}
    container: mcr.microsoft.com/playwright:focal
    permissions:
      issues: write
    timeout-minutes: 30
    env:
      CI_BROWSER_ARGS: ${{ github.event.inputs.ci_browser_args }}
      CORS_ALLOW_ORIGIN: '*'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        shell: bash

      - name: Build
        run: npm run build

      - name: Map tauri.localhost to runner loopback
        run: |
          # Attempt to map tauri.localhost to 127.0.0.1 but do not fail the job if not permitted
          if [ -w /etc/hosts ] || command -v sudo >/dev/null 2>&1; then
            sudo sed -i '/tauri.localhost/d' /etc/hosts || true
            sudo bash -lc "printf '127.0.0.1 tauri.localhost\n' | cat - /etc/hosts > /tmp/hosts && sudo mv /tmp/hosts /etc/hosts" || true
          else
            echo 'No permission to modify /etc/hosts; continuing without host mapping.'
          fi
          echo '--- /etc/hosts entries for tauri.localhost ---'
          sudo grep -n 'tauri.localhost' /etc/hosts || true
          echo '--- getent hosts ---'
          getent hosts tauri.localhost || true
          echo '--- ping (IPv4) ---'
          ping -4 -c1 tauri.localhost || true
          echo '--- ping (IPv6) ---'
          ping -6 -c1 tauri.localhost || true
        shell: bash

      - name: Start ping server (background)
        run: |
          nohup env PORT=8765 node .github/workflows/ping-server.cjs > /tmp/ux-ping-8765.log 2>&1 &
          nohup env PORT=8877 node .github/workflows/ping-server.cjs > /tmp/ux-ping-8877.log 2>&1 &
          sleep 1
        shell: bash

      - name: Verify ping servers responding (debug)
        run: |
          echo 'curl 8765 ->'
          curl -svS http://127.0.0.1:8765/ux-ping || true
          echo 'curl 8877 ->'
          curl -svS http://127.0.0.1:8877/ux-ping || true
          echo 'tail /tmp/ux-ping-8765.log'
          sudo sed -n '1,200p' /tmp/ux-ping-8765.log || true
          echo 'tail /tmp/ux-ping-8877.log'
          sudo sed -n '1,200p' /tmp/ux-ping-8877.log || true
          echo 'listening ports (ss)'
          ss -ltnp | sed -n '1,200p' || true
        shell: bash

      - name: Wait for ping servers to return 200
        run: |
          for i in {1..20}; do
            c1=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8765/ux-ping || true)
            c2=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8877/ux-ping || true)
            if [ "$c1" = "200" ] && [ "$c2" = "200" ]; then echo "ping servers ready"; exit 0; fi
            echo "waiting for ping servers ($i) - 8765=$c1 8877=$c2"; sleep 1
          done
          echo 'ping servers did not become ready'; echo '--- /tmp/ux-ping-8765.log ---'; sudo sed -n '1,200p' /tmp/ux-ping-8765.log || true; echo '--- /tmp/ux-ping-8877.log ---'; sudo sed -n '1,200p' /tmp/ux-ping-8877.log || true; exit 1
        shell: bash

      - name: Verify dist exists
        run: |
          echo 'Checking dist directory'
          if [ ! -d "$GITHUB_WORKSPACE/dist" ]; then echo 'dist missing' && ls -la || true; exit 1; fi
          ls -la "$GITHUB_WORKSPACE/dist" | sed -n '1,80p'
        shell: bash

      - name: Start static server (background)
        run: |
          echo "Starting python static server serving $GITHUB_WORKSPACE/dist on 1420"
          nohup python3 -m http.server 1420 --bind 0.0.0.0 --directory "$GITHUB_WORKSPACE/dist" > /tmp/static.log 2>&1 &
          sleep 1
        shell: bash

      - name: Wait for static server
        run: |
          for i in {1..60}; do
            code1=$(curl -s -o /dev/null -w "%{http_code}" http://tauri.localhost:1420/ || true)
            code2=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:1420/ || true)
            if [ "$code1" = "200" ] || [ "$code2" = "200" ]; then echo "static ready"; exit 0; fi
            echo "waiting for static ($i) - codes: tauri.localhost=$code1, 127.0.0.1=$code2"; sleep 1
          done
          echo "static did not become ready"; echo "--- /tmp/static.log ---"; sudo cat /tmp/static.log || true; exit 1
        shell: bash

      - name: Debug network before browser (verbose)
        run: |
          echo '--- curl static (tauri.localhost & 127.0.0.1) ---'
          curl -svS http://tauri.localhost:1420/ || true
          curl -svS http://127.0.0.1:1420/ || true
          echo '--- curl ping servers (both hosts/ports) ---'
          curl -svS http://tauri.localhost:8765/ux-ping || true
          curl -svS http://127.0.0.1:8765/ux-ping || true
          curl -svS http://tauri.localhost:8877/ux-ping || true
          curl -svS http://127.0.0.1:8877/ux-ping || true
          echo '--- tail static & ping logs ---'
          sudo sed -n '1,200p' /tmp/static.log || true
          sudo sed -n '1,200p' /tmp/ux-ping-8765.log || true
          sudo sed -n '1,200p' /tmp/ux-ping-8877.log || true
          echo '--- listening ports (ss) ---'
          ss -ltnp || true
        shell: bash

      - name: Pre-smoke connectivity probes (Node)
        run: |
          echo 'Running pre-smoke connectivity probes';
          node .github/workflows/pre-smoke-probes.cjs || true
          echo '--- connectivity-preflight.json ---';
          sudo sed -n '1,200p' builds/diagnostics/connectivity-preflight.json || true
        shell: bash

      - name: Preflight health check (PowerShell)
        shell: bash
        env:
          URL: 'http://127.0.0.1:1420/'
        run: |
          if command -v pwsh >/dev/null 2>&1; then
            pwsh -NoProfile -NonInteractive -File ./scripts/health-check.ps1 -Url "$URL" -Ports 8765,8877
          else
            echo 'pwsh not available in this environment; skipping PowerShell preflight check.'
          fi

      - name: Browser resolve debug (Playwright)
        env:
          URL: 'http://127.0.0.1:1420/'
        run: |
          echo 'Running browser resolve debug'
          node .github/workflows/browser-resolve-debug.cjs || true
          echo '--- browser-resolve.json ---'
          sudo sed -n '1,200p' builds/diagnostics/browser-resolve.json || true
        shell: bash

      - name: Dockerized browser resolve debug (host-network)
        env:
          URL: 'http://127.0.0.1:1420/'
        run: |
          echo 'Running browser resolve debug inside Docker container with --network host'
          # Prefer host networking, but fall back to regular Docker if not supported in runner
          if docker run --rm --network host --help >/dev/null 2>&1; then
            docker run --rm --network host -v "$GITHUB_WORKSPACE":/work -w /work mcr.microsoft.com/playwright:focal bash -lc "npm ci --no-audit --no-fund >/dev/null 2>&1 || true; node .github/workflows/browser-resolve-debug.cjs || true" || true
          else
            echo 'Host networking not supported; running Docker without --network host'
            docker run --rm -v "$GITHUB_WORKSPACE":/work -w /work mcr.microsoft.com/playwright:focal bash -lc "npm ci --no-audit --no-fund >/dev/null 2>&1 || true; node .github/workflows/browser-resolve-debug.cjs || true" || true
          fi
          echo '--- browser-resolve.json (from Docker run) ---'
          sudo sed -n '1,200p' builds/diagnostics/browser-resolve.json || true
        shell: bash

      - name: Dockerized full smoke run (services + browser in container)
        env:
          URL: 'http://127.0.0.1:1420/'
        run: |
          echo 'Running full stack inside Playwright Docker image (services + browser)'
          if command -v docker >/dev/null 2>&1; then
            docker run --rm -v "$GITHUB_WORKSPACE":/work -w /work --shm-size=1g mcr.microsoft.com/playwright:focal bash -lc "set -e
            npm ci --no-audit --no-fund
            npm run build
            nohup env PORT=8765 node .github/workflows/ping-server.cjs > /tmp/ux-ping-8765.log 2>&1 &
            nohup env PORT=8877 node .github/workflows/ping-server.cjs > /tmp/ux-ping-8877.log 2>&1 &
            nohup python3 -m http.server 1420 --directory dist > /tmp/static.log 2>&1 &
            sleep 2
            node .github/workflows/browser-resolve-debug.cjs || true
            node Tests/playwright/smoke.cjs > .github/actions-runs/last-smoke.log 2>&1 || true
            echo '--- browser-resolve.json ---'
            cat builds/diagnostics/browser-resolve.json || true
            echo '--- smoke-result.full.json ---'
            cat builds/diagnostics/smoke-result.full.json || true"
          else
            echo 'Docker not available in this environment; running full stack commands directly in the job container'
            set -e
            npm ci --no-audit --no-fund || true
            npm run build || true
            nohup env PORT=8765 node .github/workflows/ping-server.cjs > /tmp/ux-ping-8765.log 2>&1 &
            nohup env PORT=8877 node .github/workflows/ping-server.cjs > /tmp/ux-ping-8877.log 2>&1 &
            nohup python3 -m http.server 1420 --directory dist > /tmp/static.log 2>&1 &
            sleep 2
            node .github/workflows/browser-resolve-debug.cjs || true
            node Tests/playwright/smoke.cjs > .github/actions-runs/last-smoke.log 2>&1 || true
            echo '--- browser-resolve.json ---'
            cat builds/diagnostics/browser-resolve.json || true
            echo '--- smoke-result.full.json ---'
            cat builds/diagnostics/smoke-result.full.json || true
          fi
        shell: bash

      - name: Browser preflight (Playwright)
        env:
          URL: 'http://127.0.0.1:1420/'
        run: |
          echo 'Running browser preflight using Playwright'
          node .github/workflows/browser-preflight.cjs || true
          echo '--- browser-preflight.json ---'
          sudo sed -n '1,200p' builds/diagnostics/browser-preflight.json || true
        shell: bash

      - name: Run smoke (save logs)
        env:
          URL: 'http://127.0.0.1:1420/'
        run: |
          mkdir -p .github/actions-runs || true
          node Tests/playwright/smoke.cjs > .github/actions-runs/last-smoke.log 2>&1 || true
          ls -la .github/actions-runs || true
        shell: bash

      - name: Parse artifacts (generate summary)
        run: |
          node scripts/parse-smoke-artifacts.cjs || true
      - name: Auto-triage smoke artifacts
        if: always()
        run: |
          node scripts/auto-triage-smoke.cjs || true
          echo '--- auto-triage output ---'
          sudo sed -n '1,200p' .github/actions-runs/smoke-triage.txt || true
        shell: bash

      - name: Add triage tags to job summary
        if: always()
        run: |
          node -e "const fs=require('fs'); const p='builds/diagnostics/triage.json'; const sum=process.env.GITHUB_STEP_SUMMARY || '.github/actions-runs/step-summary.txt'; if (fs.existsSync(p)){ const f=require('./'+p); const tags=(f.inferredTags||[]).join(', '); const sev=f.severity||'unknown'; fs.appendFileSync(sum, '## Smoke triage\n- inferredTags: '+(tags||'none')+'\n- severity: '+sev+'\n'); console.log('Appended triage tags and severity to job summary'); } else { console.log('triage.json not found'); }"
        shell: bash

      - name: Create GitHub Issue for critical triage
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const p = 'builds/diagnostics/triage.json';
            if (!fs.existsSync(p)) { console.log('triage.json not found; skipping issue creation'); return; }
            const t = JSON.parse(fs.readFileSync(p, 'utf8'));
            if ((t.severity || '').toLowerCase() !== 'critical') { console.log('severity is not critical (actual='+t.severity+'); skipping issue creation'); return; }
            const inferred = (t.inferredTags || []).slice(0, 10);
            const bodyObj = {
              success: t.success,
              inferredTags: t.inferredTags || [],
              severity: t.severity,
              internalErrors: (t.internalErrors || []).slice(0, 10)
            };
            const excerpt = JSON.stringify(bodyObj, null, 2);
            const title = 'CI auto-triage: critical failure detected';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Search for existing open issues with same normalized title and any matching inferred tag
            console.log('Searching for existing open issues with title and inferredTags:', inferred);
            const normalize = s => (''+(s||'')).toLowerCase().replace(/[^a-z0-9]/g,'').trim();
            const normTitle = normalize(title);
            // page through all open issues (per_page=100)
            let allIssues = [];
            let page = 1;
            while (true) {
              const res = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100, page });
              if (!res || !res.data || res.data.length === 0) break;
              allIssues = allIssues.concat(res.data);
              if (res.data.length < 100) break;
              page += 1;
            }
            console.log('Fetched open issues count:', allIssues.length);
            let candidates = (allIssues || []).filter(issue => {
              if (!issue || !issue.title) return false;
              if (normalize(issue.title) !== normTitle) return false;
              const issueLabels = (issue.labels || []).map(l => (typeof l === 'string') ? l : (l && l.name)).filter(Boolean);
              return issueLabels.some(l => inferred.includes(l));
            });
            // Persist candidate list to job summary for debugging
            try {
              const sum = process.env.GITHUB_STEP_SUMMARY || '.github/actions-runs/step-summary.txt';
              const candLine = candidates.length ? candidates.map(c => `#${c.number} ${c.html_url || ''}`).join(', ') : 'none';
              fs.appendFileSync(sum, `- triage candidates: ${candLine}\n`);
              console.log('Wrote triage candidates to job summary:', candLine);
            } catch (e) { console.log('Failed to append triage candidates to job summary', e); }

            if (candidates.length > 0) {
              // pick the most recently created open issue
              candidates.sort((a,b) => new Date(b.created_at || b.createdAt) - new Date(a.created_at || a.createdAt));
              const existing = candidates[0];
              const now = new Date().toISOString();
              const comment = `triage 自動診断により同一カテゴリの critical failure が再検出されました。最新 triage.json の抜粋を以下に記録します。\n\n\`\`\`json\n${excerpt}\n\`\`\`\n\n(commented at ${now})`;
              const commentRes = await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body: comment });
              const commentUrl = commentRes && commentRes.data && commentRes.data.html_url ? commentRes.data.html_url : (existing.html_url || `https://github.com/${owner}/${repo}/issues/${existing.number}`);
              const commentCreatedAt = commentRes && commentRes.data && commentRes.data.created_at ? commentRes.data.created_at : now;
              const sum = process.env.GITHUB_STEP_SUMMARY || '.github/actions-runs/step-summary.txt';
              try {
                fs.appendFileSync(sum, `- triage issue: appended to existing #${existing.number} ${existing.html_url} (commented: ${commentCreatedAt}) comment: ${commentUrl}\n`);
                console.log('Appended issue comment and wrote summary for existing issue:', existing.number, commentUrl, commentCreatedAt);
              } catch (e) { console.log('Failed to append existing issue info to job summary', e); }
              return;
            }

            // No existing matching issue found — create a new one
            const labels = inferred;
            const body = `Auto-triage detected a critical smoke failure.\n\n**triage.json (excerpt)**:\n\n\`\`\`json\n${excerpt}\n\`\`\``;
            console.log('Creating issue with labels:', labels);
            const res = await github.rest.issues.create({ owner, repo, title, body, labels });
            const issueUrl = (res && res.data && (res.data.html_url || (`https://github.com/${owner}/${repo}/issues/${res.data.number}`))) || 'unknown';
            const issueNumber = res && res.data && res.data.number ? res.data.number : 'unknown';
            const issueCreatedAt = res && res.data && (res.data.created_at || res.data.createdAt) ? (res.data.created_at || res.data.createdAt) : 'unknown';
            const sum = process.env.GITHUB_STEP_SUMMARY || '.github/actions-runs/step-summary.txt';
            try {
                fs.appendFileSync(sum, `- triage issue: #${issueNumber} ${issueUrl} (created: ${issueCreatedAt})\n`);
              console.log('Appended issue info to job summary:', issueNumber, issueUrl, issueCreatedAt);
            } catch (e) { console.log('Failed to append issue URL to job summary', e); }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List expected artifact locations
        if: always()
        run: |
          echo '--- workspace root ---'
          ls -la "$GITHUB_WORKSPACE" | sed -n '1,200p' || true
          echo '--- .github/actions-runs ---'
          ls -la .github/actions-runs || true
          echo '--- builds/diagnostics ---'
          ls -la builds/diagnostics || true
          echo '--- screenshots ---'
          ls -la screenshots || true
          echo '--- capture disk usage ---'
          du -sh .github/actions-runs || true
          du -sh builds/diagnostics || true
          du -sh screenshots || true
        shell: bash

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: |
            .github/actions-runs/last-smoke.log
            .github/actions-runs/smoke-summary.txt
            .github/actions-runs/triage.json
            builds/diagnostics/**
            screenshots/**
