name: Playwright Smoke Compare

on:
  workflow_dispatch: {}
  push:
    branches: [ main, feature/** ]
  pull_request: {}

env:
  DISABLE_CDP: "1"

jobs:
  smoke-compare:
    name: Smoke Compare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_CONFIG: Tests/playwright/playwright.config.cjs
      ENFORCE_CLIP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        shell: bash

      - name: Build
        run: npm run build

      - name: Serve dist (background)
        run: |
          npx http-server dist -p 1420 -c-1 &
          npx wait-on http://localhost:1420

      - name: Run smoke capture (CI)
        env:
          FORCE_SYSTEM_UI: "1"
          DISABLE_CDP: "1"
          URL: "http://localhost:1420/"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          mkdir -p builds/screenshots
          node Tests/playwright/exec_smoke_save.cjs

      - name: Compare screenshots
        env:
          SKIP_RUN_SMOKE: "1"
          COMPARE_PAD: "1"
          COMPARE_TARGET_HEIGHT: "1236"
          DISABLE_CDP: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run smoke:diff

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: builds/screenshots/**
