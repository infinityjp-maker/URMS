name: Playwright Smoke Compare

on:
  workflow_dispatch: {}
  push:
    branches: [ main, feature/** ]
  pull_request: {}

env:
  DISABLE_CDP: "1"

jobs:
  smoke-compare:
    name: Smoke Compare
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      PLAYWRIGHT_CONFIG: Tests/playwright/playwright.config.cjs
      ENFORCE_CLIP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        shell: bash

      - name: Build
        run: npm run build

      - name: Serve dist (background)
        run: |
          npx http-server dist -p 1420 -c-1 &
          npx wait-on http://localhost:1420

      - name: Run smoke capture (CI)
        env:
          FORCE_SYSTEM_UI: "1"
          DISABLE_CDP: "1"
          FAST_SMOKE: "1"
          SMOKE_HARD_TIMEOUT_MS: "300000"
          URL: "http://localhost:1420/"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          set -euo pipefail
          mkdir -p builds/screenshots builds/diagnostics
          echo "MARK: smoke-step-start $(date -u +%FT%TZ)" | tee -a builds/screenshots/tlog.txt
          # start ux-ping mock server (repo-local script, no heredoc needed)
          python3 -u Tests/playwright/ux_ping_server.py > /tmp/ux_ping.log 2>&1 &
          # wait up to 20s for both ports
          ok8765=0; ok8877=0
          for i in $(seq 1 20); do
            curl -fsS http://127.0.0.1:8765/ux-ping -m 1 >/dev/null 2>&1 && ok8765=1
            curl -fsS http://127.0.0.1:8877/ux-ping -m 1 >/dev/null 2>&1 && ok8877=1
            [ "$ok8765" -eq 1 ] && [ "$ok8877" -eq 1 ] && break
            sleep 1
          done
          echo "ux-ping health: 8765=$ok8765 8877=$ok8877" | tee -a builds/screenshots/tlog.txt
          echo "MARK: pre-smoke-stabilize-wait-start $(date -u +%FT%TZ)" | tee -a builds/screenshots/tlog.txt
          sleep 12
          echo "MARK: pre-smoke-stabilize-wait-end $(date -u +%FT%TZ)" | tee -a builds/screenshots/tlog.txt
          cat /tmp/ux_ping.log | tee -a builds/screenshots/tlog.txt || true
          node Tests/playwright/exec_smoke_save.cjs 2>&1 | tee -a builds/screenshots/tlog.txt
          echo "MARK: smoke-step-end $(date -u +%FT%TZ)" | tee -a builds/screenshots/tlog.txt

      - name: Compare screenshots
        env:
          SKIP_RUN_SMOKE: "1"
          COMPARE_PAD: "1"
          COMPARE_TARGET_HEIGHT: "1292"
          DISABLE_CDP: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run smoke:diff

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: |
            builds/screenshots/**
            builds/diagnostics/**
            /tmp/ux_ping.log
