name: Playwright Smoke Compare

on:
  workflow_dispatch: {}
  push:
    branches: [ main, feature/** ]
  pull_request: {}

env:
  DISABLE_CDP: "1"

jobs:
  smoke-compare:
    name: Smoke Compare
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      PLAYWRIGHT_CONFIG: Tests/playwright/playwright.config.cjs
      ENFORCE_CLIP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        shell: bash

      - name: Build
        run: npm run build

      - name: Serve dist (background)
        run: |
          npx http-server dist -p 1420 -c-1 &
          npx wait-on http://localhost:1420

      - name: Run smoke capture (CI)
        env:
          FORCE_SYSTEM_UI: "1"
          DISABLE_CDP: "1"
          URL: "http://localhost:1420/"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          mkdir -p builds/screenshots
          # start ux-ping mock server on ports 8765 and 8877
          cat > /tmp/ux_ping_server.py <<'PY'
from http.server import BaseHTTPRequestHandler, HTTPServer
import json, threading, sys

class H(BaseHTTPRequestHandler):
    def log_message(self, *a): pass
    def _cors(self):
        self.send_header('Access-Control-Allow-Origin','*')
        self.send_header('Access-Control-Allow-Methods','GET,POST,OPTIONS')
        self.send_header('Access-Control-Allow-Headers','Content-Type')
    def _ok(self):
        d = json.dumps({"ok":True,"port":self.server.server_port}).encode()
        self.send_response(200); self._cors()
        self.send_header('Content-Type','application/json'); self.end_headers()
        try: self.wfile.write(d)
        except: pass
    def do_OPTIONS(self):
        self.send_response(204); self._cors(); self.end_headers()
    def do_GET(self):
        if '/ux-ping' in self.path: self._ok()
        else: self.send_response(404); self.end_headers()
    def do_POST(self):
        ln = int(self.headers.get('Content-Length',0))
        if ln: self.rfile.read(ln)
        if '/ux-ping' in self.path: self._ok()
        else: self.send_response(404); self.end_headers()

def serve(port):
    s = HTTPServer(('127.0.0.1',port),H)
    print(f'ux-ping ready on {port}',flush=True)
    s.serve_forever()

if __name__=='__main__':
    for p in [8765,8877]:
        threading.Thread(target=serve,args=(p,),daemon=True).start()
    print('ux-ping servers started',flush=True)
    import time
    try:
        while True: time.sleep(60)
    except: pass
PY
          python3 -u /tmp/ux_ping_server.py > /tmp/ux_ping.log 2>&1 &
          # wait up to 20s for both ports
          ok8765=0; ok8877=0
          for i in $(seq 1 20); do
            curl -fsS http://127.0.0.1:8765/ux-ping -m 1 >/dev/null 2>&1 && ok8765=1
            curl -fsS http://127.0.0.1:8877/ux-ping -m 1 >/dev/null 2>&1 && ok8877=1
            [ "$ok8765" -eq 1 ] && [ "$ok8877" -eq 1 ] && break
            sleep 1
          done
          echo "ux-ping health: 8765=$ok8765 8877=$ok8877"
          cat /tmp/ux_ping.log || true
          node Tests/playwright/exec_smoke_save.cjs

      - name: Compare screenshots
        env:
          SKIP_RUN_SMOKE: "1"
          COMPARE_PAD: "1"
          COMPARE_TARGET_HEIGHT: "1236"
          DISABLE_CDP: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run smoke:diff

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: |
            builds/screenshots/**
            builds/diagnostics/**
