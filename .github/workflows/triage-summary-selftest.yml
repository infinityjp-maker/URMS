name: Triage Summary Selftest

concurrency:
  group: triage-summary-selftest
  cancel-in-progress: false

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 18 * * *'

permissions:
  contents: read

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Ensure tools
        run: |
          sudo apt-get update -y || true
          sudo apt-get install -y jq unzip || true

      - name: Generate current triage summary if test input exists
        env:
          DEST: ${{ runner.temp }}/triage-summary.md
        run: |
          TMP=${RUNNER_TEMP}
          if [ -f "builds/diagnostics/triage.json" ]; then
            node .github/workflows/generate-triage-summary.cjs DEST="$DEST" || (echo 'generator failed' && exit 1)
          else
            echo "No test input; skipping generation"
          fi
        shell: bash

      - name: Validate triage outputs (selftest)
        run: |
          node .github/triage-tools/validate-triage-output.cjs "$RUNNER_TEMP" || (echo 'selftest validation failed' && exit 1)
        shell: bash

      - name: Build integrated report (save to RUNNER_TEMP)
        run: |
          set -e
          TMP=${RUNNER_TEMP}
          OUT="$TMP/triage-summary-full-report.md"
          echo "# Triage Summary Full Report" > "$OUT"
          echo "Generated: $(date -u --rfc-3339=seconds)" >> "$OUT"
          echo "" >> "$OUT"
          if [ -f "$TMP/triage-summary.md" ]; then
            awk '/## Overview/{flag=1} /---/{if(flag && /Details/){exit}} flag{print}' "$TMP/triage-summary.md" | sed -n '1,200p' >> "$OUT" || true
          fi
          echo "" >> "$OUT"
          DIFF="$TMP/triage-diff.json"
          if [ -f "$DIFF" ]; then
            jq '.' "$DIFF" >> "$OUT" 2>/dev/null || cat "$DIFF" >> "$OUT"
          else
            echo '- No triage-diff.json available' >> "$OUT"
          fi
        shell: bash

      - name: Summarize diff and LLM summary (must succeed)
        run: |
          set -e
          TMP=${RUNNER_TEMP}
          node .github/triage-tools/summarize-diff.cjs --in "$TMP/triage-diff.json" --out "$TMP/triage-diff-summary.md"
          node .github/triage-tools/llm-summarize-diff.cjs --in "$TMP/triage-diff.json" --out "$TMP/triage-llm-summary.md"
          mkdir -p "$TMP/selftest-outputs"
          cp "$TMP/triage-diff-summary.md" "$TMP/selftest-outputs/triage-diff-summary.md" || true
          cp "$TMP/triage-llm-summary.md" "$TMP/selftest-outputs/triage-llm-summary.md" || true
          cp "$TMP/triage-summary-full-report.md" "$TMP/selftest-outputs/triage-summary-full-report.md" || true
        shell: bash

      - name: Upload selftest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: triage-selftest-outputs
          path: ${{ runner.temp }}/selftest-outputs
