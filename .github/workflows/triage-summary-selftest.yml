name: Triage Summary Self-Test

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 * * *' # nightly

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Run generator with test input
        env:
          TRIAGE_INPUT: .github/testdata/triage.json
          DEST: ${{ runner.temp }}/triage-summary.md
        run: |
          node .github/workflows/generate-triage-summary.cjs DEST="$DEST" || (echo 'generator failed' && exit 1)

      - name: Verify generated files
        run: |
          set -e
          TMP=${RUNNER_TEMP}
          echo "Checking files in $TMP"
          required=(triage-summary.md triage-summary.html triage-summary.txt triage-summary.md.gz triage-summary.html.gz triage-summary.txt.gz)
          for f in "${required[@]}"; do
            if [ ! -f "$TMP/$f" ]; then echo "MISSING: $f"; exit 1; fi
            echo "OK: $f";
          done
          # check md contains Overview and Summary
          grep -q "## Overview" "$TMP/triage-summary.md"
          grep -q "### Summary" "$TMP/triage-summary.md"
          # check html contains severity badge or critical
          if ! grep -qi "critical" "$TMP/triage-summary.html" && ! grep -q "#c53030" "$TMP/triage-summary.html"; then
            echo "Severity badge not found in HTML"; exit 1;
          fi
          # test gzip integrity
          for gz in "$TMP"/*.gz; do
            gunzip -t "$gz" || (echo "gzip integrity failed: $gz" && exit 1);
            echo "gzip OK: $gz";
          done
          # if triage-internal-errors.txt expected in testdata (long internalErrors), ensure it exists
          if [ -f "$TMP/triage-internal-errors.txt" ]; then echo "Found extracted internal errors"; fi
          echo 'SELFTEST OK'
        shell: bash

      - name: Validate triage outputs (selftest)
        run: |
          echo 'Validating triage outputs (selftest)'
          node .github/triage-tools/validate-triage-output.cjs "$RUNNER_TEMP" || (echo 'selftest validation failed' && exit 1)
        shell: bash

      - name: Upload selftest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: triage-selftest-artifacts
          path: |
            ${{ runner.temp }}/triage-summary.*
            ${{ runner.temp }}/triage-internal-errors.txt
