name: Triage Dashboard E2E Test

on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 18 * * *'
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  e2e:
    name: Run Playwright E2E against gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --prefer-offline --no-audit --progress=false || npm install --no-audit --no-fund

      - name: Install Playwright dependencies
        run: |
          # Ensure Playwright test package is available for the node-runner
          npm install --no-audit --no-fund --no-save @playwright/test
          npx playwright install --with-deps

      - name: Fetch gh-pages branch (clone)
        run: |
          rm -rf _gh_pages || true
          git clone --branch gh-pages --depth 1 https://github.com/infinityjp-maker/URMS.git _gh_pages || true

      - name: Remove legacy Tests/ directory if present
        run: |
          if [ -d Tests ]; then
            echo "Removing legacy Tests/ directory"
            rm -rf Tests || true
          else
            echo "No legacy Tests/ directory present"
          fi

      - name: Start static server for _gh_pages
        run: |
          echo "Starting simple HTTP server for _gh_pages on port 8000"
          python3 -m http.server 8000 --directory _gh_pages &>/dev/null &
          sleep 1

      - name: List dashboard files
        run: ls -la _gh_pages || true

      - name: Show repository files for debugging
        run: |
          echo "Workspace: $PWD"
          ls -la || true

      - name: List tests directory recursively
        run: |
          echo "Listing ./tests recursively"
          ls -R tests || true

      - name: Run Playwright E2E script
        env:
          BASE_DIR: _gh_pages
          BASE_URL: http://127.0.0.1:8000
        run: |
          echo "Executing E2E script via node ./tests/dashboard-e2e.cjs (BASE_URL=$BASE_URL)"
          # Capture stdout/stderr to e2e_run.log for artifact upload
          node ./tests/dashboard-e2e.cjs 2>&1 | tee e2e_run.log || true

      - name: Upload E2E run log artifact
        uses: actions/upload-artifact@v4
        with:
          name: triage-dashboard-e2e-log
          path: e2e_run.log
