name: Playwright Smoke Trial Step2

on:
  workflow_dispatch: {}
  push:
    branches: [ feat/di-navigation-scaffold ]

jobs:
  step2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Cache npm
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-node-20.x-npm-${{ hashFiles('**/package-lock.json','**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20.x-npm-
            ${{ runner.os }}-npm-

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: |
            node_modules
          key: ${{ runner.os }}-node-20.x-node-modules-${{ hashFiles('**/package-lock.json','**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20.x-node-modules-
            ${{ runner.os }}-node-modules-

      - name: Install dependencies (if needed)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          npm ci
        shell: bash

      - name: Echo OK
        run: |
          echo "install step done"