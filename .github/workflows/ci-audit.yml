name: CI Audit PowerShell

on:
  push: {}
  pull_request: {}

jobs:
  ci-audit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CI PowerShell audit
        id: run_audit
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\actions-runner\ci-audit-powershell.ps1 2>&1 | Tee-Object -FilePath audit-output.txt
          exit $LASTEXITCODE

      - name: Upload audit output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-audit-output
          path: audit-output.txt

      - name: Run PowerShell tests
        id: run_tests
        shell: pwsh
        run: |
          $tests = Get-ChildItem -Path .\actions-runner\test-*.ps1 -File -ErrorAction SilentlyContinue
          if (-not $tests) { Write-Output 'No tests found'; exit 0 }
          if (-not (Test-Path .\actions-runner\test-results)) { New-Item -Path .\actions-runner\test-results -ItemType Directory | Out-Null }
          $overall = $true
          $outFile = 'test-run-output.txt'
          Remove-Item -Force -ErrorAction SilentlyContinue $outFile
          foreach ($t in $tests) {
            Write-Output "=== Running $($t.Name) ===" | Tee-Object -FilePath $outFile -Append
            pwsh -NoProfile -ExecutionPolicy Bypass -File $t.FullName 2>&1 | Tee-Object -FilePath $outFile -Append
            if ($LASTEXITCODE -ne 0) { $overall = $false; Write-Output "TEST-FAILED:$($t.Name)" | Tee-Object -FilePath $outFile -Append }
          }
          if ($overall) { Write-Output 'ALL TESTS PASSED' ; exit 0 } else { Write-Output 'SOME TESTS FAILED' ; exit 1 }

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: powershell-test-output
          path: |
            test-run-output.txt
            actions-runner/test-results

      - name: Run local test runner
        id: run_local_runner
        shell: pwsh
        run: |
          # Run the existing local test runner which includes an auto-fix loop
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\actions-runner\run-local-tests.ps1 -RepoRoot ${{ github.workspace }} -MaxAttempts 3 2>&1 | Tee-Object -FilePath test-run-output.txt
          exit $LASTEXITCODE

      - name: Generate test results JSON
        if: always()
        id: gen_test_json
        shell: pwsh
        run: |
          $out = ''
          if (Test-Path test-run-output.txt) { $out = Get-Content test-run-output.txt -Raw }
          $results = @()
          if (-not [string]::IsNullOrWhiteSpace($out)) {
            $matches = Select-String -InputObject $out -Pattern '=== Running\s+(?<name>.+?)\s+===' -AllMatches
            foreach ($m in $matches.Matches) {
              $name = $m.Groups['name'].Value.Trim()
              $pass = -not ($out -match "TEST-FAILED:$([regex]::Escape($name))")
              $results += [pscustomobject]@{ test = $name; passed = $pass }
            }
          }
          $jsonPath = 'actions-runner/test-results.json'
          if (-not (Test-Path (Split-Path $jsonPath))) { New-Item -ItemType Directory -Path (Split-Path $jsonPath) -Force | Out-Null }
          $results | ConvertTo-Json -Depth 3 | Set-Content -Path $jsonPath -Encoding utf8
          Write-Output "WROTE:$jsonPath"

      - name: Upload test results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: powershell-test-json
          path: actions-runner/test-results.json

      - name: Prepare PowerShell test summary
        if: github.event_name == 'pull_request'
        id: prepare_test_summary
        shell: pwsh
        run: |
          # load test output (prefer workspace root)
          $out = ''
          if (Test-Path test-run-output.txt) { $out = Get-Content test-run-output.txt -Raw } elseif (Test-Path .\actions-runner\test-run-output.txt) { $out = Get-Content .\actions-runner\test-run-output.txt -Raw }
          $lines = @()
          if (-not [string]::IsNullOrWhiteSpace($out)) { $lines = $out -split "`n" }

          # determine status
          $status = 'PASS'
          if ($out -match 'TEST-FAILED:') { $status = 'FAIL' }

          # badge for quick visibility
          if ($status -eq 'PASS') { $badge = '![PASS](https://img.shields.io/badge/Tests-PASS-brightgreen)' } else { $badge = '![FAIL](https://img.shields.io/badge/Tests-FAIL-red)' }

          # build simple test results table from run markers
          $tests = @()
          $running = Select-String -InputObject $out -Pattern '=== Running\s+(?<name>.+?)\s+===' -AllMatches | ForEach-Object { $_.Matches } | ForEach-Object { $_.Groups['name'].Value.Trim() }
          foreach ($t in $running) {
            $res = 'PASS'
            if ($out -match "TEST-FAILED:$([regex]::Escape($t))") { $res = 'FAIL' }
            $tests += "| $t | $res |"
          }
          if (-not $tests) { $testsTable = '| Test | Result |\n|---|---|\n|(<no tests run>)| - |' } else { $testsTable = '| Test | Result |\n|---|---|' + [char]10 + ($tests -join [char]10) }

          # snippet for collapsed output (limit 20 lines)
          $snippet = ($lines | Select-Object -First 20) -join "`n"
          if ([string]::IsNullOrWhiteSpace($snippet)) { $snippet = '(<no test output>)' }

          $artifactLink = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts"

          $body = "## PowerShell Test Summary `n$badge `n`n**Status:** $status`n`n**Artifact:** $artifactLink`n`n**Results:**`n`n$testsTable`n`n<details><summary>test-run-output.txt (first 20 lines)</summary>`n`n```" + [char]10 + "$snippet" + [char]10 + "```" + [char]10 + "</details>"

          # robustly write outputs to GITHUB_OUTPUT
          try {
            if (-not (Test-Path $env:GITHUB_OUTPUT)) { New-Item -Path $env:GITHUB_OUTPUT -ItemType File -Force | Out-Null }
            Add-Content -Path $env:GITHUB_OUTPUT -Value "test_status=$status"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "body<<EOF"
            Add-Content -Path $env:GITHUB_OUTPUT -Value $body
            Add-Content -Path $env:GITHUB_OUTPUT -Value "EOF"
          } catch {
            # fallback: ensure minimal outputs
            try { Set-Content -Path $env:GITHUB_OUTPUT -Value "test_status=$status`nbody<<EOF`n$body`nEOF" -Force } catch { Write-Warning "Failed to write GITHUB_OUTPUT: $($_.Exception.Message)" }
          }

      - name: Comment on PR with PowerShell test summary
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.prepare_test_summary.outputs.body }}

      - name: Self-heal attempt
        if: failure() && github.event_name == 'pull_request'
        id: selfheal
        shell: pwsh
        run: |
          # Determine PR branch and compute previous selfheal attempts
          $branch = $env:GITHUB_HEAD_REF
          if ([string]::IsNullOrWhiteSpace($branch)) { $branch = (git rev-parse --abbrev-ref HEAD) }
          $count = 0
          try {
            $count = (git log --pretty=%B -n 50 | Select-String -Pattern 'ci(selfheal): attempt' | Measure-Object).Lines
          } catch {
            $count = 0
          }
          $next = $count + 1
          $reason = ''
          # quick reason extraction
          if (Test-Path audit-output.txt) { $a = Get-Content audit-output.txt -Raw; if ($a -match 'ParserError|Exception|Traceback') { $reason = ($Matches[0]) } }
          if (-not $reason -and (Test-Path test-run-output.txt)) { $t = Get-Content test-run-output.txt -Raw; if ($t -match 'ParserError|Exception|Traceback') { $reason = ($Matches[0]) } }
          if ($next -le 3) {
            try {
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git commit --allow-empty -m "ci(selfheal): attempt $next"
              git push origin HEAD:$branch
              $needs = 'true'
            } catch {
              $needs = 'false'
              $reason = "push failed: $($_.Exception.Message)"
            }
          } else {
            $needs = 'false'
          }
          # write outputs
          try { if (-not (Test-Path $env:GITHUB_OUTPUT)) { New-Item -Path $env:GITHUB_OUTPUT -ItemType File -Force | Out-Null } } catch {}
          Add-Content -Path $env:GITHUB_OUTPUT -Value "needs_retry=$needs"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "attempt=$next"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "reason=$reason"

      - name: Prepare audit PR comment body
        if: failure() && github.event_name == 'pull_request'
        id: prepare_comment
        shell: pwsh
        env:
          SELFHEAL_ATTEMPT: ${{ steps.selfheal.outputs.attempt || '' }}
        run: |
          $content = ''
          if (Test-Path audit-output.txt) { $content = Get-Content audit-output.txt -Raw }
          $snippet = (($content -split "`n") | Select-Object -First 200) -join "`n"
          if ([string]::IsNullOrWhiteSpace($snippet)) { $snippet = '(<no audit output>)' }

          # audit badge
          $auditStatus = 'FAIL'
          if ($content -match 'No audit violations found') { $auditStatus = 'PASS' }
          if ($auditStatus -eq 'PASS') { $auditBadge = '![PASS](https://img.shields.io/badge/Audit-PASS-brightgreen)' } else { $auditBadge = '![FAIL](https://img.shields.io/badge/Audit-FAIL-red)' }

          # build artifacts link as button-like text
          $artifactLink = "[Artifacts ▶](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)"

          $attemptInfo = ''
          if (-not [string]::IsNullOrWhiteSpace($env:SELFHEAL_ATTEMPT)) { $attemptInfo = "*Self-heal attempt:* $env:SELFHEAL_ATTEMPT`n`n" }
$body = "## CI Audit Results `n$auditBadge `n`n$attemptInfo<details><summary>Audit output (first 200 lines)</summary>`n`n```" + [char]10 + $snippet + [char]10 + "```" + [char]10 + "</details>"

          try {
            if (-not (Test-Path $env:GITHUB_OUTPUT)) { New-Item -Path $env:GITHUB_OUTPUT -ItemType File -Force | Out-Null }
            Add-Content -Path $env:GITHUB_OUTPUT -Value "body<<EOF"
            Add-Content -Path $env:GITHUB_OUTPUT -Value $body
            Add-Content -Path $env:GITHUB_OUTPUT -Value "EOF"
          } catch {
            try { Set-Content -Path $env:GITHUB_OUTPUT -Value "body<<EOF`n$body`nEOF" -Force } catch { Write-Warning "Failed to write GITHUB_OUTPUT for audit: $($_.Exception.Message)" }
          }

      - name: Comment on PR with audit output
        if: failure() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.prepare_comment.outputs.body }}


