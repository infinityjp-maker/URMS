name: CI Audit PowerShell

on:
  push: {}
  pull_request: {}

jobs:
  ci-audit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CI PowerShell audit
        id: run_audit
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\actions-runner\ci-audit-powershell.ps1 2>&1 | Tee-Object -FilePath audit-output.txt
          exit $LASTEXITCODE

      - name: Upload audit output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-audit-output
          path: audit-output.txt

      - name: Run PowerShell tests
        id: run_tests
        shell: pwsh
        run: |
          $tests = Get-ChildItem -Path .\actions-runner\test-*.ps1 -File -ErrorAction SilentlyContinue
          if (-not $tests) { Write-Output 'No tests found'; exit 0 }
          if (-not (Test-Path .\actions-runner\test-results)) { New-Item -Path .\actions-runner\test-results -ItemType Directory | Out-Null }
          $overall = $true
          $outFile = 'test-run-output.txt'
          Remove-Item -Force -ErrorAction SilentlyContinue $outFile
          foreach ($t in $tests) {
            Write-Output "=== Running $($t.Name) ===" | Tee-Object -FilePath $outFile -Append
            pwsh -NoProfile -ExecutionPolicy Bypass -File $t.FullName 2>&1 | Tee-Object -FilePath $outFile -Append
            if ($LASTEXITCODE -ne 0) { $overall = $false; Write-Output "TEST-FAILED:$($t.Name)" | Tee-Object -FilePath $outFile -Append }
          }
          if ($overall) { Write-Output 'ALL TESTS PASSED' ; exit 0 } else { Write-Output 'SOME TESTS FAILED' ; exit 1 }

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: powershell-test-output
          path: |
            test-run-output.txt
            actions-runner/test-results

      - name: Prepare PowerShell test summary
        if: github.event_name == 'pull_request'
        id: prepare_test_summary
        shell: pwsh
        run: |
          $out = ''
          if (Test-Path test-run-output.txt) { $out = Get-Content test-run-output.txt -Raw } elseif (Test-Path .\actions-runner\test-run-output.txt) { $out = Get-Content .\actions-runner\test-run-output.txt -Raw }
          $lines = $out -split "`n"
          $snippet = (($lines) | Select-Object -First 20) -join "`n"
          $status = 'PASS'
          if ($out -match 'TEST-FAILED:') { $status = 'FAIL' }
          $artifactLink = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts"
          $body = "### PowerShell Test Summary\n- Status: $status\n- Artifact: $artifactLink\n\n<details><summary>test-run-output.txt (first 20 lines)</summary>\n\n```\n$snippet\n```\n</details>\n"
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo $body >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment on PR with PowerShell test summary
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.prepare_test_summary.outputs.body }}

      - name: Save run id for artifacts link
        if: github.event_name == 'pull_request'
        id: save_run
        shell: pwsh
        run: |
          echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Prepare PR comment body
        if: failure() && github.event_name == 'pull_request'
        id: prepare_comment
        shell: pwsh
        run: |
          $content = ''
          if (Test-Path audit-output.txt) { $content = Get-Content audit-output.txt -Raw }
          $snippet = (($content -split "`n") | Select-Object -First 200) -join "`n"
          $body = "### CI Audit failed\n<details><summary>Audit output (first 200 lines)</summary>\n\n```\n$snippet\n```\n</details>\n"
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo $body >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment on PR with audit output
        if: failure() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.prepare_comment.outputs.body }}
