name: Cleanup old artifacts

on:
  schedule:
    - cron: '0 0 * * *' # daily
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Purge artifacts older than 30 days
        uses: actions/github-script@v6
        with:
          script: |
            const days = 30;
            const cutoff = Date.now() - (days * 24 * 60 * 60 * 1000);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let page = 1;
            let removed = 0;
            while (true) {
              const res = await github.rest.actions.listArtifactsForRepo({ owner, repo, per_page: 100, page });
              if (!res || !res.data || !res.data.artifacts || res.data.artifacts.length === 0) break;
              for (const a of res.data.artifacts) {
                const created = new Date(a.created_at).getTime();
                if (created < cutoff) {
                  try {
                    await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
                    console.log('Deleted artifact', a.id, a.name, a.created_at);
                    removed += 1;
                  } catch (e) {
                    console.log('Failed to delete artifact', a.id, a.name, e);
                  }
                }
              }
              if (res.data.artifacts.length < 100) break;
              page += 1;
            }
            console.log('Cleanup complete. Removed artifacts:', removed);
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
