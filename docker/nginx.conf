upstream urms_api {
  server api:3000;
}

upstream urms_web {
  server web:80;
}

server {
  listen 80;
  server_name _;

  location /health {
    proxy_pass http://urms_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /v1/ {
    proxy_pass http://urms_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    proxy_pass http://urms_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}
